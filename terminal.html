<!DOCTYPE html>

<style>
html, body {
    height: 100%;
}
    
body{
    background:black;
    color:#00ff88;
    font-family:monospace;
    text-align:center;
    margin:0;
    padding:100px 15px 30px 15px;
}

.glitch{
    font-size:32px;
    text-shadow:0 0 10px #00ff88;
    margin-top: 0px;
    margin-bottom: 20px;
}

.box{
    border:1px solid #00ff88;
    box-shadow:0 0 20px #00ff88;
    padding:25px;
    width:90%;
    max-width:850px;
    margin:auto;
    min-height:500px;
}

button{
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px 15px;
    margin:10px;
    cursor:pointer;
    font-family:monospace;
    transition:0.2s;
    font-size:16px;
}

button:hover{
    background:#00ff88;
    color:black;
}

input{
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px;
    width:90%;
    max-width:400px;
    text-align:center;
    font-family:monospace;
    margin-top:10px;
}

#message{
    margin-top:20px;
    white-space:pre-line;
    min-height:50px;
}

.question{
    margin-top:20px;
    font-size:20px;
    line-height:1.6;
}

.score{
    position: fixed;
    top: 10px;
    right: 10px;
    color: #00ff88;
    border: 1px solid #00ff88;
    padding: 8px 12px;
    background: black;
    z-index: 9999;
    font-size: 14px;
    max-width: 120px;
    text-align: center;
}

h1,h2,h3{
    text-shadow:0 0 5px #00ff88;
}

ul{
    text-align:left;
    display:inline-block;
}

/* ADMIN PANEL */
#adminPanel{
    position:fixed;
    bottom:10px;
    left:10px;
    border:1px solid red;
    padding:10px;
    background:black;
    color:red;
    font-size:12px;
}

@media (max-width: 768px) {

    body {
        padding: 15px;
    }

    .glitch {
        font-size: 22px;
    }

    h1 {
        font-size: 24px;
    }

    h2 {
        font-size: 20px;
    }

    .box {
        padding: 15px;
        min-height: auto;
    }

    .score {

        padding: 6px;
        right: 10px;

    #adminPanel {
        font-size: 10px;
        padding: 6px;
    }

    button {
        width: 90%;
        margin: 5px 0;
    }
}

</style>
</head>

<div class="glitch">🕵️ TERMINAL CLASSIFIÉ</div>

<p>/// PROCÉDURE D'ÉVALUATION ACTIVE ///</p>

<div class="box">

    <div id="content"></div>

    <div id="message"></div>

</div>

<div id="adminPanel">

🧪 MODE TEST ACTIF

+1h
</button>

<script>

//////////////////////////////////////////////////////
// 🧪 MODE / PROFIL
//////////////////////////////////////////////////////
const urlParams = new URLSearchParams(window.location.search);
const MODE_ADMIN = urlParams.get("mode") === "admin";

const MODE_TEST = MODE_ADMIN;

let simulatedDate = new Date("2026-05-12T10:31:00");

// attendre que le HTML soit prêt
window.addEventListener("DOMContentLoaded", () => {

    if (!MODE_ADMIN) {
        document.getElementById("adminPanel").style.display = "none";
    }

    if (MODE_ADMIN) {
        document.getElementById("adminBanner").style.display = "block";
    }

});

//////////////////////////////////////////////////////
// 💾 SAUVEGARDE
//////////////////////////////////////////////////////

let points =
parseInt(localStorage.getItem("points")) || 0;

document.getElementById("points").innerText =
points;

let progression =
parseInt(localStorage.getItem("progression")) || 0;

let observationValidee =
localStorage.getItem("observation") || "non";

let indiceUtilise =
localStorage.getItem("indiceUtilise") || "non";


//////////////////////////////////////////////////////
// 📅 ÉTAPES
//////////////////////////////////////////////////////

const etapes = [

{
date: new Date("2026-05-12T10:30:00"),
type:"enigme"
},

{
date: new Date("2026-05-12T17:00:00"),
type:"preparation"
},

{
date: new Date("2026-05-12T19:30:00"),
type:"bowling"
},
    
{
date: new Date("2026-05-12T20:00:00"),
type:"briefing_temps"
},

{
date: new Date("2026-05-13T15:40:00"),
type:"temps"
},

{
date: new Date("2026-05-14T10:00:00"),
type: "enquete"
},

{
date: new Date("2026-05-14T16:00:00"),
type:"questionnaire"
},


{
date: new Date("2026-05-14T20:00:00"),
type:"repos"
},


{
date: new Date("2026-05-16T10:00:00"),
type: "colis_mario"
},

    
{
date: new Date("2026-05-16T20:00:00"),
type:"spectacle"
},

{
date: new Date("2026-05-17T16:00:00"),
type:"vol"
},

{
date: new Date("2026-05-17T18:00:00"),
type:"final"
}

];

//////////////////////////////////////////////////////
// 💾 SAVE
//////////////////////////////////////////////////////

function save(){

    localStorage.setItem("progression", progression);

    localStorage.setItem("points", points);

    document.getElementById("points").innerText =
    points;
}

//////////////////////////////////////////////////////
// 🔒 ÉCRAN VERROUILLAGE
//////////////////////////////////////////////////////

function lockedScreen(date){

    let now;

    if(MODE_TEST){
        now = simulatedDate;
    }else{
        now = new Date();
    }

    if(now < date){

        let diff = date - now;

        let jours =
        Math.floor(diff / (1000 * 60 * 60 * 24));

        let heures =
        Math.floor((diff / (1000 * 60 * 60)) % 24);

        let minutes =
        Math.floor((diff / (1000 * 60)) % 60);

        let secondes =
        Math.floor((diff / 1000) % 60);

        document.getElementById("content").innerHTML = `

        <h2>⛔ ACCÈS VERROUILLÉ</h2>

        <p>
        La prochaine instruction
        n'est pas encore disponible.
        </p>

        <h3>
        ⏳ PROCHAINE INSTRUCTION DANS :
        </h3>

        <h1>
        ${jours}j ${heures}h ${minutes}m ${secondes}s
        </h1>

        <p>
        Temps simulé :
        <br>
        ${now.toLocaleString()}
        </p>

        `;

        setTimeout(afficher,1000);

        return true;
    }

    return false;
}

//////////////////////////////////////////////////////
// 🚀 AFFICHAGE
//////////////////////////////////////////////////////

function afficher(){

    document.getElementById("message").innerText = "";

    if (progression >= etapes.length) {
        afficherFinal();
        return;
    }

    let etape = etapes[progression];

    if(!etape){
        document.getElementById("content").innerHTML = `
            <h2>🏁 FIN OU ERREUR DE FLUX</h2>
            <p>Progression hors limite : ${progression}</p>
        `;
        return;
    }

    if(lockedScreen(etape.date)) return;

    if(etape.type === "enigme") afficherEnigme();
    if(etape.type === "preparation") afficherPreparation();
    if(etape.type === "bowling") afficherBowling();
    if(etape.type === "briefing_temps") afficherBriefingTemps();
    if(etape.type === "temps") afficherTemps();
    if(etape.type === "enquete") afficherDossierEnquete();
    if(etape.type === "repos") afficherRepos();
    if(etape.type === "questionnaire") demanderMeteoVendredi();
    if(etape.type === "colis_mario") afficherColisMario();
    if(etape.type === "spectacle") afficherSpectacle();
    if(etape.type === "vol") afficherVol();
    if(etape.type === "final") afficherFinal();
}
//////////////////////////////////////////////////////
// 🧠 ÉNIGME OBSERVATION
//////////////////////////////////////////////////////

function afficherEnigme(){

document.getElementById("content").innerHTML = `

<h2>🧠 TEST D'OBSERVATION</h2>

<div class="question">

Pour trouver votre première épreuve,
observez attentivement votre environnement
de cette matinée.

</div>

<input id="rep">

<br>

<button onclick="validerEnigme()">
VALIDER
</button>

<button onclick="indice()">
INDICE 💡
</button>

`;

}

function indice(){

indiceUtilise = "oui";

localStorage.setItem("indiceUtilise","oui");

document.getElementById("message").innerText =
"Comment aurais-tu fait sans indice ? 📷";

}

function validerEnigme(){

let rep =
document.getElementById("rep")
.value.toLowerCase();

if(rep === "bowling"){

    if(indiceUtilise !== "oui"){

        document.getElementById("message").innerText =
        "Sens de l'observation validé.";

        points += 20;

        observationValidee = "oui";

        localStorage.setItem("observation","oui");

        localStorage.setItem("indiceUtilise","non");

    }else{

        document.getElementById("message").innerText =
        "Observation assistée détectée.";

        points += 10;
    }

    progression++;

    save();

    setTimeout(afficher,2000);

}else{

    document.getElementById("message").innerText =
    "Accès refusé.";

}

}

Entrez votre score total :
</p>

<input id="scoreBowling" type="number">

</button>

function validerBowling(){

let score = parseInt(document.getElementById("scoreBowling").value);

let message = "";

if(score < 40){

    document.getElementById("content").innerHTML = `

    <h2>❌ ÉCHEC DE L'ÉPREUVE</h2>

    <p>
    Performance insuffisante.
    Vous devez repasser l’épreuve.
    </p>

    <p>
    Code de rattrapage requis :
    </p>

    <input id="mdp">

    <br>

    <button onclick="motMagique()">
    VALIDER
    </button>

    `;

    document.getElementById("message").innerText =
    "Accès en rattrapage activé.";

    return;
}

if(score < 60){

    message = `
🔴 FAIBLE

Quelques réussites mais trop d’irrégularité.

➤ Statut : EN FORTE PROGRESSION
`;

    points += 5;

}else if(score < 90){

    message = `
🟠 MOYEN

Résultat correct mais instable.

➤ Statut : AGENT EN APPRENTISSAGE
`;

    points += 15;

}else if(score < 120){

    message = `
🟡 BON

Bonne maîtrise générale du jeu.

➤ Statut : AGENT COMPÉTENT
`;

    points += 30;

}else{

    message = `
🟢 TRÈS BON

Excellente performance.

➤ Statut : AGENT PROMETTEUR
`;

    points += 40;
}

document.getElementById("message").innerText = message;

progression++;

save();

setTimeout(() => {
    afficher();
}, 4000);

}
function motMagique(){

let mdp =
document.getElementById("mdp").value;

if(mdp === "J'aime Midu !"){

    points += 15;

    document.getElementById("message").innerText =
    "Dérogation acceptée.";

    progression++;

    save();

    "Refus.";

}

}

progression++;
save();

    afficher();
}, 3000);

document.getElementById("content").innerHTML = `

<p>
Une anomalie a été détectée après le Time Tripper. Une porte du temps est restée ouverte.

<input id="repEnquete" placeholder="Votre réponse">

VALIDER
</button>

}

let startEnqueteTime = 0;

function validerDossierEnquete(){

let rep = document.getElementById("repEnquete").value.toLowerCase();

let endTime = Date.now();

let temps = endTime - startEnqueteTime; // ms
let minutes = temps / 60000;

if(rep === "enquête" || rep === "enquete"){

    let message = "";

    if(minutes <= 120){

        message = `
🟢 DOSSIER DÉVERROUILLÉ

Accès au fichier Stranger Things confirmé.

⚠ Anomalie détectée dans la zone.
`;

        points += 40;

    } else {

        message = `
🟠 DOSSIER PARTIEL

Analyse trop lente.

Fragments de l'anomalie récupérés partiellement.
`;
        points += 20;
    }

    progression++;
    save();

    document.getElementById("message").innerText = message;

    setTimeout(afficher, 3000);

}else{

    document.getElementById("message").innerText =
    "❌ Code incorrect.";

}

}

// 1️⃣ RÉCUPÉRATION DU COLIS
function afficherColisMario(){

    document.getElementById("message").innerText = "";

    document.getElementById("content").innerHTML = `

        <h2>📦 COLIS CLASSIFIÉ</h2>

        <p>
        Un colis sécurisé vous a été attribué.
        </p>

        <p>
        Mission : le récupérer physiquement avant activation.
        </p>

        <button onclick="afficherEnigmeColis()">
        J'AI RÉCUPÉRÉ LE COLIS
        </button>

    `;

}

// 2️⃣ AFFICHAGE DE L'ÉNIGME
function afficherEnigmeColis(){

    document.getElementById("message").innerText =
    "✔ Colis confirmé en possession.";

    document.getElementById("content").innerHTML = `

        <h2>🧩 DÉCODAGE DU COLIS</h2>

        <p>
        Je peux être rapide ou longue,<br>
        je commence quand on part,<br>
        et je termine quand on franchit la ligne.
        </p>

        <input id="repCourse">

        <br>

        <button onclick="validerEnigmeColis()">
        VALIDER
        </button>

    `;

}

// 3️⃣ VALIDATION → AUTORISATION D'OUVRIR
function validerEnigmeColis(){

    let rep = document.getElementById("repCourse")
                       .value.toLowerCase();

    if(rep.includes("course")){

        points += 30;
        save();

        document.getElementById("message").innerText =
        "🔓 Code correct : colis déverrouillé.";

        document.getElementById("content").innerHTML = `

            <h2>📦 ACCÈS AUTORISÉ</h2>

            <p>
            Le colis peut maintenant être ouvert.
            </p>

            <button onclick="ouvrirColisMario()">
            OUVRIR LE COLIS
            </button>

        `;

    }else{

        document.getElementById("message").innerText =
        "❌ Mauvaise analyse du colis.";

    }

}

// 4️⃣ OUVERTURE + LANCEMENT DU JEU
function ouvrirColisMario(){

    document.getElementById("message").innerText =
    "🎮 Module détecté.";

    document.getElementById("content").innerHTML = `

        <h2>🎮 MARIO KART DELUXE 8</h2>

        <p>
        Lance une partie et reviens avec ton résultat.
        </p>

        <p>
        Quelle est ta meilleure position ?
        </p>

        <input id="posMario" type="number">

        <br>

        <button onclick="validerMario()">
        VALIDER POSITION
        </button>

    `;

}

// 5️⃣ NOTATION DU CLASSEMENT
function validerMario(){

    let pos = parseInt(
        document.getElementById("posMario").value
    );

    let message = "";

    if(pos <= 3){
        message = "🏆 Agent d'élite - performance exceptionnelle";
        points += 40;
    }else if(pos <= 6){
        message = "🟡 Agent compétent - mission réussie";
        points += 25;
    }else{
        message = "🔴 Agent en formation - besoin d'entraînement";
        points += 10;
    }

    progression++;
    save();

    document.getElementById("content").innerHTML = `

        <h2>🏁 RÉSULTAT DE SIMULATION</h2>

        <p>${message}</p>

        <button onclick="afficher()">
        CONTINUER ▶
        </button>

    `;

}


//////////////////////////////////////////////////////
// 🎭 SPECTACLE
//////////////////////////////////////////////////////

function afficherSpectacle(){

let texte = `
<h2>🎭 TEST DE SENSIBILITÉ</h2>
`;

if(indiceUtilise === "oui"){

texte += `

<p>
Certaines vérités ne peuvent être découvertes
qu'en observant les détails invisibles.
</p>

<p>
⚠ Rattrapage du sens de l'observation activé.
</p>

<p>
Choisissez votre formateur :
</p>

<input id="spectacleRep">

<br>

<button onclick="validerObservation()">
VALIDER
</button>

`;

}else{

texte += `

<p>
Le prochain test porte
sur votre sensibilité artistique.
</p>

<p>
Quel type de spectacle mélange :
chant, théâtre et mise en scène ?
</p>

<input id="spectacleRep">

<br>

<button onclick="validerSpectacle()">
VALIDER
</button>

`;

}

document.getElementById("content").innerHTML =
texte;

}

function validerObservation(){

let rep =
document.getElementById("spectacleRep")
.value.toLowerCase();

if(
rep.includes("c")
|| rep.includes("sherlock")
){

    points += 30;

    document.getElementById("message").innerText =
`
Test de sensibilité validé.
Observation renforcée.
`;

    progression++;

    save();

    setTimeout(afficher,2000);

}else{

    document.getElementById("message").innerText =
    "Analyse incorrecte.";
}

}

function validerSpectacle(){

let rep =
document.getElementById("spectacleRep")
.value.toLowerCase();

if(
rep.includes("comédie musicale")
|| rep.includes("comedie musicale")
){

    points += 30;

    document.getElementById("message").innerText =
`
Test de sensibilité validé.
`;

    progression++;

    save();

    setTimeout(afficher,2000);

}else{

    document.getElementById("message").innerText =
    "Réponse incorrecte.";
}

}

//////////////////////////////////////////////////////
// 🧪 OUTILS TEST
//////////////////////////////////////////////////////

function avanceTemps(h){

    simulatedDate =
    new Date(
        simulatedDate.getTime()
        + h * 60 * 60 * 1000
    );

    afficher();
}

function resetProgression(){

    localStorage.clear();

    progression = 0;
    points = 0;

    observationValidee = "non";

    indiceUtilise = "non";

    document.getElementById("message").innerText =
    "Progression réinitialisée.";

    document.getElementById("points").innerText =
    points;

    afficher();
}

// 🚀 LANCEMENT
//////////////////////////////////////////////////////

afficher();
