    🟥 ADMIN CONNECTÉ

<p>/// PROCÉDURE D'ÉVALUATION ACTIVE ///</p>

<div class="box">

    <div id="content"></div>

    <div id="message"></div>

</div>

<div id="adminPanel">

🧪 MODE TEST ACTIF

+1h
</button>

</button>

</button>

    position:fixed;
    bottom:10px;
    right:10px;
    z-index:9999;
">

    background:black;

    font-size:11px;
    padding:5px 10px;

" title="Réinitialiser ma progression">
🔄 RESET
</button>

<script>

//////////////////////////////////////////////////////
// 🧪 MODE / PROFIL
//////////////////////////////////////////////////////
const urlParams = new URLSearchParams(window.location.search);
const MODE_ADMIN = urlParams.get("mode") === "admin";

const MODE_TEST = MODE_ADMIN;

let simulatedDate = new Date("2026-05-12T10:31:00");

// attendre que le HTML soit prêt
window.addEventListener("DOMContentLoaded", () => {

    if (!MODE_ADMIN) {
        document.getElementById("adminPanel").style.display = "none";
    }

    if (MODE_ADMIN) {
        document.getElementById("adminBanner").style.display = "block";
    }

});

//////////////////////////////////////////////////////
// 💾 SAUVEGARDE
//////////////////////////////////////////////////////

let points =
parseInt(localStorage.getItem("points")) || 0;

document.getElementById("points").innerText =
points;

let progression =
parseInt(localStorage.getItem("progression")) || 0;

let observationValidee =
localStorage.getItem("observation") || "non";

let indiceUtilise =
localStorage.getItem("indiceUtilise") || "non";

// Choix d'activité (randonnée/accrobranche), restauré au démarrage
let choixFinal = localStorage.getItem("choixActivite") || "";


//////////////////////////////////////////////////////
// 📅 ÉTAPES
//////////////////////////////////////////////////////

const etapes = [

{
date: new Date("2026-05-12T10:30:00"),
type:"enigme"
},

{
date: new Date("2026-05-12T17:00:00"),
type:"preparation"
},

// ── Briefing Time Tripper le soir du 12 ──────────────
{
date: new Date("2026-05-12T20:00:00"),
type:"briefing_temps"
},

// ── Score Time Tripper le 13 ─────────────────────────
{
date: new Date("2026-05-13T15:40:00"),
type:"temps"
},

// ── Score bowling après le Time Tripper ──────────────
{
date: new Date("2026-05-13T19:00:00"),
type:"bowling"
},

{
date: new Date("2026-05-14T10:00:00"),
type: "enquete"
},

// ── Page de choix dès 13h le 14 ──────────────────────
{
date: new Date("2026-05-14T13:00:00"),
type: "choix_enquete"
},

// ── Suite de l'aventure (durée enquête) à 16h ────────
{
date: new Date("2026-05-14T16:00:00"),
type: "suite_enquete"
},

// ── Mario Kart vendredi 15 à 16h ─────────────────────
{
date: new Date("2026-05-15T10:00:00"),
type: "colis_mario"
},

// ── Rando / accrobranche / eau savonneuse samedi 16h ─
{
date: new Date("2026-05-16T16:00:00"),
type: "activite_duree"
},

{
date: new Date("2026-05-16T20:00:00"),
type:"spectacle"
},

{
date: new Date("2026-05-17T16:00:00"),
type:"vol"
},

{
date: new Date("2026-05-17T18:00:00"),
type:"final"
}

];

//////////////////////////////////////////////////////
// 💾 SAVE
//////////////////////////////////////////////////////

function save(){

    localStorage.setItem("progression", progression);

    localStorage.setItem("points", points);

    document.getElementById("points").innerText =
    points;
}

//////////////////////////////////////////////////////
// 🔒 ÉCRAN VERROUILLAGE
//////////////////////////////////////////////////////

function lockedScreen(date){

    let now;

    if(MODE_TEST){
        now = simulatedDate;
    }else{
        now = new Date();
    }

    if(now < date){

        let diff = date - now;

        let jours =
        Math.floor(diff / (1000 * 60 * 60 * 24));

        let heures =
        Math.floor((diff / (1000 * 60 * 60)) % 24);

        let minutes =
        Math.floor((diff / (1000 * 60)) % 60);

        let secondes =
        Math.floor((diff / 1000) % 60);

        document.getElementById("content").innerHTML = `

        <h2>⛔ ACCÈS VERROUILLÉ</h2>

        <p>
        La prochaine instruction
        n'est pas encore disponible.
        </p>

        <h3>
        ⏳ PROCHAINE INSTRUCTION DANS :
        </h3>

        <h1>
        ${jours}j ${heures}h ${minutes}m ${secondes}s
        </h1>

        <p>
        Temps simulé :
        <br>
        ${now.toLocaleString()}
        </p>

        `;

        setTimeout(afficher,1000);

        return true;
    }

    return false;
}

//////////////////////////////////////////////////////
// 🚀 AFFICHAGE
//////////////////////////////////////////////////////

function afficher(){

    document.getElementById("message").innerText = "";

    if (progression >= etapes.length) {
        afficherFinal();
        return;
    }

    let etape = etapes[progression];

    if(!etape){
        document.getElementById("content").innerHTML = `
            <h2>🏁 FIN OU ERREUR DE FLUX</h2>
            <p>Progression hors limite : ${progression}</p>
        `;
        return;
    }

    if(lockedScreen(etape.date)) return;

    if(etape.type === "enigme")          afficherEnigme();
    if(etape.type === "preparation")     afficherPreparation();
    if(etape.type === "bowling")         afficherBowling();
    if(etape.type === "briefing_temps")  afficherBriefingTemps();
    if(etape.type === "temps")           afficherTemps();
    if(etape.type === "enquete")         afficherDossierEnquete();
    if(etape.type === "choix_enquete")   afficherChoixEnquete();
    if(etape.type === "suite_enquete")   afficherSuiteEnquete();
    if(etape.type === "colis_mario")     afficherColisMario();
    if(etape.type === "activite_duree")  afficherActiviteDuree();
    if(etape.type === "spectacle")       afficherSpectacle();
    if(etape.type === "vol")             afficherVol();
    if(etape.type === "final")           afficherFinal();
}

//////////////////////////////////////////////////////
// 🧠 ÉNIGME OBSERVATION
//////////////////////////////////////////////////////

function afficherEnigme(){

document.getElementById("content").innerHTML = `

<h2>🧠 TEST D'OBSERVATION</h2>

<div class="question">

Pour trouver votre première épreuve,
observez attentivement votre environnement
de cette matinée.

</div>

<input id="rep">

<br>

<button onclick="validerEnigme()">
VALIDER
</button>

<button onclick="indice()">
INDICE 💡
</button>

`;

}

function indice(){

indiceUtilise = "oui";

localStorage.setItem("indiceUtilise","oui");

document.getElementById("message").innerText =
"Comment aurais-tu fait sans indice ? 📷";

}

function validerEnigme(){

let rep =
document.getElementById("rep")
.value.toLowerCase();

if(rep === "bowling"){

    if(indiceUtilise !== "oui"){

        document.getElementById("message").innerText =
        "Sens de l'observation validé.";

        points += 20;

        observationValidee = "oui";

        localStorage.setItem("observation","oui");

        localStorage.setItem("indiceUtilise","non");

    }else{

        document.getElementById("message").innerText =
        "Observation assistée détectée.";

        points += 10;
    }

    progression++;

    save();

    setTimeout(afficher,2000);

}else{

    document.getElementById("message").innerText =
    "Accès refusé.";

}

}

//////////////////////////////////////////////////////
// 👖 TENUE TIME TRIPPER
//////////////////////////////////////////////////////
    
function afficherPreparation(){

document.getElementById("content").innerHTML = `

<h2>🧳 PRÉPARATION DE MISSION</h2>

<p>
Agent,
</p>

<p>
Il est temps de préparer votre tenue
pour l'épreuve de demain.
</p>

<p>
Prévoyez :
</p>

<ul>
<li>👟 Des baskets</li>
<li>👖 Un pantalon confortable</li>
<li>🩳 Jogging envisageable</li>
</ul>

<p>
Le terrain exact n'a pas encore été validé.
</p>

<button onclick="continuerPreparation()">
COMPRIS
</button>

`;

}

//////////////////////////////////////////////////////
// 🎳 BOWLING
//////////////////////////////////////////////////////

function afficherBowling(){

document.getElementById("content").innerHTML = `

<h2>🎳 ÉPREUVE : PRÉCISION</h2>

<p>
Entrez votre score total :
</p>

<input id="scoreBowling" type="number">

<br>

<button onclick="validerBowling()">
VALIDER SCORE
</button>

`;

}

function validerBowling(){

let score = parseInt(document.getElementById("scoreBowling").value);

let message = "";

if(score < 40){

    document.getElementById("content").innerHTML = `

    <h2>❌ ÉCHEC DE L'ÉPREUVE</h2>

    <p>
    Performance insuffisante.
    Vous devez repasser l'épreuve.
    </p>

    <p>
    Code de rattrapage requis :
    </p>

    <input id="mdp">

    <br>

    <button onclick="motMagique()">
    VALIDER
    </button>

    `;

    document.getElementById("message").innerText =
    "Accès en rattrapage activé.";

    return;
}

if(score < 60){

    message = `
🔴 FAIBLE

Quelques réussites mais trop d'irrégularité.

➤ Statut : EN FORTE PROGRESSION
`;

    points += 5;

}else if(score < 90){

    message = `
🟠 MOYEN

Résultat correct mais instable.

➤ Statut : AGENT EN APPRENTISSAGE
`;

    points += 15;

}else if(score < 120){

    message = `
🟡 BON

Bonne maîtrise générale du jeu.

➤ Statut : AGENT COMPÉTENT
`;

    points += 30;

}else{

    message = `
🟢 TRÈS BON

Excellente performance.

➤ Statut : AGENT PROMETTEUR
`;

    points += 40;
}

document.getElementById("message").innerText = message;

progression++;

save();

setTimeout(() => {
    afficher();
}, 4000);

}

function motMagique(){

let mdp =
document.getElementById("mdp").value;

if(mdp === "J'aime Midu !"){

    points += 15;

    document.getElementById("message").innerText =
    "Dérogation acceptée.";

    progression++;

    save();

    setTimeout(afficher,2000);

}else{

    document.getElementById("message").innerText =
    "Refus.";

}

}

//////////////////////////////////////////////////////
// ⏳ BRIEFING TEMPS
//////////////////////////////////////////////////////

function afficherBriefingTemps(){

document.getElementById("content").innerHTML = `

<h2>⏳ PROCHAIN TEST</h2>

<p>
Votre prochaine épreuve portera
sur votre maîtrise du temps.
</p>

<p>
📍 RDV à Hôpital Bicêtre à 13h20.
</p>

<p>
Soyez à l'heure.
</p>

<button onclick="continuerBriefingTemps()">
COMPRIS
</button>

`;

}

function continuerBriefingTemps(){

save();

afficher();

}

//////////////////////////////////////////////////////
// ⏳ TEMPS
//////////////////////////////////////////////////////

function afficherTemps(){

document.getElementById("content").innerHTML = `

<h2>⏳ MAÎTRISE DU TEMPS</h2>


<p>
À quelle étape êtes-vous arrivé ? (1 à 7)
</p>

<input id="tempsScore" type="number">

<br>

<button onclick="validerTemps()">
VALIDER
</button>

`;

}

function validerTemps(){

let rep = parseInt(document.getElementById("tempsScore").value);

let message = "";

if(rep >= 5){

    message = "Maîtrise du temps exceptionnelle. Vous avez parfaitement géré votre progression.";
    points += 30;

}else if(rep >= 3){

    message = "Bonne maîtrise du temps. Vous êtes dans le rythme attendu.";
    points += 20;

}else{

    message = "Progression rapide mais désorganisée. Attention à la gestion du timing.";
    points += 10;
}

document.getElementById("message").innerText = message;

progression++;
save();

setTimeout(() => {
    afficher();
}, 3000);

}

//////////////////////////////////////////////////////
//  DOSSIER D'ENQUETE
//////////////////////////////////////////////////////
function afficherDossierEnquete(){

startEnqueteTime = Date.now();

document.getElementById("content").innerHTML = `

<h2>🧩 DOSSIER CLASSIFIÉ</h2>

<p>
Une anomalie a été détectée après le Time Tripper. Une porte du temps est restée ouverte.
</p>

<p>
Décodez le message pour accéder au dossier et trouver comment refermer la porte.
</p>

<h3>🔐 ÉNIGME :</h3>

<p style="font-size:18px">
🧠 Je suis un mot que les agents doivent résoudre.<br>
Je commence par un E, je contient une mission,<br>
et je mène toujours à une investigation.
</p>

<input id="repEnquete" placeholder="Votre réponse">

<br>

<button onclick="validerDossierEnquete()">
VALIDER
</button>

`;

}

let startEnqueteTime = 0;

function validerDossierEnquete(){

let rep = document.getElementById("repEnquete").value.toLowerCase();

let endTime = Date.now();

let temps = endTime - startEnqueteTime; // ms
let minutes = temps / 60000;

if(rep === "enquête" || rep === "enquete"){

    let message = "";

    if(minutes <= 120){

        message = `
🟢 DOSSIER DÉVERROUILLÉ

Accès au fichier Stranger Things confirmé.

⚠ Anomalie détectée dans la zone.
`;

        points += 40;

    } else {

        message = `
🟠 DOSSIER PARTIEL

Analyse trop lente.

Fragments de l'anomalie récupérés partiellement.
`;
        points += 20;
    }

    progression++;
    save();

    document.getElementById("message").innerText = message;

    setTimeout(afficher, 3000);

}else{

    document.getElementById("message").innerText =
    "❌ Code incorrect.";

}

}

//////////////////////////////////////////////////////
// 📋 PAGE DE CHOIX APRÈS L'ENQUÊTE
//////////////////////////////////////////////////////

function afficherChoixEnquete(){

document.getElementById("message").innerText = "";

let activiteStockee = localStorage.getItem("choixActivite");
let meteoStockee    = localStorage.getItem("meteo");

let infoChoix = "";
if(activiteStockee){
    infoChoix = `
    <p style="border:1px solid #00ff88; display:inline-block; padding:8px 18px; margin-bottom:10px;">
    ✅ Activité sélectionnée : <strong>${activiteStockee.toUpperCase()}</strong>
    </p>`;
} else if(meteoStockee === "pluie"){
    infoChoix = `
    <p style="border:1px solid #00ff88; display:inline-block; padding:8px 18px; margin-bottom:10px;">
    🌧 Météo enregistrée — épreuve pluie activée
    </p>`;
}

document.getElementById("content").innerHTML = `

<h2>📋 PROCHAINES DIRECTIVES</h2>

${infoChoix}

<p>Choisissez votre prochaine action :</p>

<br>

<button onclick="demanderMeteoVendredi()" style="font-size:18px; padding:15px 25px;">
📊 QUESTIONNAIRE
</button>

<p style="font-size:13px; opacity:0.7;">
Déterminer (ou changer) l'activité selon la météo
</p>

<br>

<button onclick="continuerAventure()" style="font-size:18px; padding:15px 25px;">
▶ CONTINUER L'AVENTURE
</button>

<p style="font-size:13px; opacity:0.7;">
La suite sera disponible à 16h00
</p>

`;

}

// Avance vers suite_enquete (verrouillé jusqu'à 16h)
function continuerAventure(){

progression++;
save();
afficher();

}

//////////////////////////////////////////////////////
// 🔍 SUITE DE L'AVENTURE (durée de l'enquête)  ← NOUVEAU
//////////////////////////////////////////////////////

function afficherSuiteEnquete(){

document.getElementById("content").innerHTML = `

<h2>🔍 RÉSOLUTION DE L'ENQUÊTE</h2>

<p>
En combien de minutes avez-vous résolu l'enquête ?
</p>

<input id="dureeEnquete" type="number" placeholder="en minutes">

<br>

<button onclick="validerSuiteEnquete()">
VALIDER
</button>

`;

}

function validerSuiteEnquete(){

let minutes = parseInt(document.getElementById("dureeEnquete").value);

let message = "";

if(isNaN(minutes) || minutes <= 0){
    document.getElementById("message").innerText = "❌ Valeur invalide.";
    return;
}

if(minutes <= 30){
    message = "🟢 Résolution éclair ! Analyse exceptionnelle.\nVitesse de déduction hors norme.";
    points += 30;
}else if(minutes <= 60){
    message = "🟡 Bonne résolution. Méthodologie solide.\nAgent efficace.";
    points += 20;
}else{
    message = "🟠 Enquête résolue. Persistence récompensée.\nContinuez à affiner votre technique.";
    points += 10;
}

progression++;
save();

document.getElementById("message").innerText = message;

setTimeout(afficher, 2500);

}

//////////////////////////////////////////////////////
// 🏕️ QUESTIONNAIRE MÉTÉO + ACTIVITÉ
//////////////////////////////////////////////////////

let choixTemp = "";

function demanderMeteoVendredi(){

document.getElementById("message").innerText = "";

document.getElementById("content").innerHTML = `

<h2>🌦 PRÉVISION MÉTÉO</h2>

<p>Quelle est la météo prévue pour demain ?</p>

<button onclick="choisirMeteo('beau')">☀ Beau temps</button>
<button onclick="choisirMeteo('pluie')">🌧 Pluie</button>

`;

}

function choisirMeteo(val){

// Stocker le choix météo pour le samedi
localStorage.setItem("meteo", val);

if(val === "beau"){
    // Effacer un éventuel ancien choix pluie
    localStorage.removeItem("choixActivite");
    choixFinal = "";
    afficherQuestionnaire();
}else{
    // Pluie : effacer activité beau temps si existante, retour page choix
    localStorage.removeItem("choixActivite");
    choixFinal = "";

    document.getElementById("message").innerText =
    "🌧 Météo enregistrée.";

    setTimeout(afficherChoixEnquete, 1500);
}

}


function afficherQuestionnaire(){

document.getElementById("content").innerHTML = `

<h2>🏕️ ANALYSE PHYSIQUE</h2>

<p id="qText">
Court ou Long ?
</p>

<div id="choices">

<button onclick="choixQ1('court')">Court</button>
<button onclick="choixQ1('long')">Long</button>

</div>

`;

}

let reponsesQuestionnaire = {};

function choixQ1(val){

reponsesQuestionnaire.q1 = val;

document.getElementById("qText").innerText =
"Calme ou Sensation ?";

document.getElementById("choices").innerHTML = `

<button onclick="choixQ2('calme')">Calme</button>
<button onclick="choixQ2('sensation')">Sensation</button>

`;

}

function choixQ2(val){

reponsesQuestionnaire.q2 = val;

document.getElementById("qText").innerText =
"Basse altitude ou Haute altitude ?";

document.getElementById("choices").innerHTML = `

<button onclick="choixQ3('basse')">Basse altitude</button>
<button onclick="choixQ3('haute')">Haute altitude</button>

`;

}

function choixQ3(val){

reponsesQuestionnaire.q3 = val;

let choix = "randonnée";
let autre = "accrobranche";

if(reponsesQuestionnaire.q2 === "sensation"
|| reponsesQuestionnaire.q3 === "haute"){

choix = "accrobranche";
autre = "randonnée";

}

document.getElementById("content").innerHTML = `

<h2>📡 RÉSULTAT D'ANALYSE</h2>

<p>Épreuve recommandée :</p>

<h1>${choix.toUpperCase()}</h1>

<button onclick="confirmerChoix()">CONFIRMER</button>
<button onclick="changerChoix('${autre}')">
CHOISIR ${autre.toUpperCase()}
</button>

`;

}

function confirmerChoix(){

// Points uniquement au premier choix (pas de cumul si on refait le questionnaire)
if(!localStorage.getItem("choixActivite")){
    points += 25;
    save();
}

choixFinal = document.querySelector("h1").innerText.toLowerCase();
localStorage.setItem("choixActivite", choixFinal);
localStorage.setItem("meteo", "beau");

document.getElementById("message").innerText =
`✅ Activité confirmée : ${choixFinal.toUpperCase()}`;

// Retour à la page de choix — le joueur peut refaire le questionnaire
setTimeout(afficherChoixEnquete, 1500);

}

function changerChoix(nouveauChoix){

// Points uniquement au premier changement
if(!localStorage.getItem("choixActivite")){
    points += 20;
    save();
}

choixFinal = nouveauChoix;
localStorage.setItem("choixActivite", choixFinal);
localStorage.setItem("meteo", "beau");

document.getElementById("message").innerText =
`✅ Activité choisie : ${nouveauChoix.toUpperCase()}`;

// Retour à la page de choix — le joueur peut refaire le questionnaire
setTimeout(afficherChoixEnquete, 1500);

}

function afficherActiviteDuree(){

let meteo = localStorage.getItem("meteo");
choixFinal = localStorage.getItem("choixActivite") || choixFinal;

if(meteo === "pluie"){
    // Défi eau + savon (conditions météo instables)
    afficherPluie();

}else if(meteo === "beau" && choixFinal){
    // Demander la durée de l'activité
    afficherDuree();

}else{
    // Chemin "Suite de l'aventure" (aucune activité planifiée)
    document.getElementById("content").innerHTML = `

    <h2>📅 JOURNÉE LIBRE</h2>

    <p>

    <p>

    CONTINUER ▶

}

}

function afficherDuree(){

document.getElementById("message").innerText = "";

document.getElementById("content").innerHTML = `

<p>

<br>

<button onclick="validerDuree()">
VALIDER
</button>

`;

}

function validerDuree(){

let duree = parseFloat(document.getElementById("duree").value);

let message = "";

if(choixFinal.includes("accrobranche")){

    if(duree > 1){
        message = "Vous y êtes parvenu. Bravo pour votre persévérance.";
        points += 20;
    } else {
        message = "Bravo ! Vous êtes un rapide !";
        points += 15;
    }

}

if(choixFinal.includes("randonnée") || choixFinal.includes("randonn")){

    if(duree > 3){
        message = "Bravo ! Vous avez su gérer endurance et patience ! Vérifier l'état de votre agent accompagnateur.";
        points += 30;
    } else {
        message = "Bravo ! Vous avez su gérer endurance et motivation ! Comment avez-vous motivé les troupes ?";
        points += 25;
    }

}

if(!message){
    message = "Parcours enregistré. Bonne performance.";
    points += 15;
}

progression++;
save();

document.getElementById("content").innerHTML = `

<h2>📡 RÉSULTAT</h2>

<p style="font-size:18px">
${message}
</p>

<button onclick="afficher()">
CONTINUER ▶
</button>

`;

}
